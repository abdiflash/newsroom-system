<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsroom Sekolah</title>

<style>
body {font-family:sans-serif; margin:0; background:#f4f6f9;}
.header {background:#1F3A5F; color:white; padding:20px; text-align:center; font-size:20px;}
.container {padding:20px;}
.filter {margin-bottom:20px;}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px;}
.card {background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08);}
.badge {font-size:12px; color:gray;}
</style>

</head>

<body>

<div class="header">
Newsroom Sekolah Athalia
</div>

<div class="container">

<div class="filter">
Filter Unit:
<select id="unitFilter">
  <option value="ALL">Semua</option>
  <option value="TK">TK</option>
  <option value="SD">SD</option>
  <option value="SMP">SMP</option>
  <option value="SMA">SMA</option>
</select>
</div>

<div class="grid" id="list"></div>

</div>

<script>

const API_URL = "1piJfu19PKslfVW9ecknMSctI9d_JazwL4sTR-uM-vSk/edit?pli=1&gid=0#gid=0";

let allData = [];

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderData();
  });

document.getElementById("unitFilter").addEventListener("change", renderData);

function renderData() {
  const container = document.getElementById("list");
  container.innerHTML = "";

  const filter = document.getElementById("unitFilter").value;

  allData.forEach(item => {

    if (item.Status === "PILIH") {

      if (filter === "ALL" || item.Unit === filter) {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${item.Kegiatan}</b><br>
          <span class="badge">${item.Unit} | ${item.Tanggal}</span><br><br>
          ${item.Cerita}
        `;

        container.appendChild(div);

      }

    }

  });
}

</script>

</body>
</html>
