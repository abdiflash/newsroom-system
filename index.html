<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsroom Sekolah</title>

<style>
body {font-family:sans-serif; margin:0; background:#f4f6f9;}
.header {background:#1F3A5F; color:white; padding:20px; text-align:center;}
.container {padding:20px;}
.card {background:white; padding:15px; border-radius:12px; margin-bottom:10px; box-shadow:0 4px 10px rgba(0,0,0,0.08);}
</style>

</head>

<body>

<div class="header">
Newsroom Sekolah Athalia
</div>

<div class="container" id="list"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz5KqLB__mQ45cq1VdAeh9eToSHDIbQZugqzWlIMl4/dev";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("list");

    data.forEach(item => {

      if (item.Status === "PILIH") {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${item.Kegiatan}</b><br><br>
          ${item.Cerita}
        `;

        container.appendChild(div);

      }

    });

  });

</script>

</body>
</html>
